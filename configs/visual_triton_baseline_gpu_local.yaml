core_providers:
  core_clip: true
  core_depth_midas: true
  core_optical_flow: true
  core_object_detections: false
  content_domain: true
  franchise_recognition: true
  ocr_extractor: false
modules:
  cut_detection: true
  scene_classification: true
  video_pacing: true
  uniqueness: true
  shot_quality: false
  story_structure: false
  detalize_face: false
  emotion_face: false
  behavioral: false
  optical_flow: false
  action_recognition: false
  color_light: false
  frames_composition: false
  micro_emotion: false
  similarity_metrics: false
  text_scoring: false
global:
  root_path: null
  frames_dir: null
  rs_path: null
  max_parallel_modules: 1
  gpu_max_concurrent: auto
core_clip:
  runtime: triton
  batch_size: 1
  triton_preprocess_preset: openai_clip_224
  model_name: ViT-B/32
  model_version: unknown
  weights_digest: unknown
  engine: torch
  precision: fp32
  triton_http_url: ''
  triton_image_model_spec: ''
  triton_text_model_spec: ''
  triton_image_model_name: ''
  triton_image_model_version: ''
  triton_image_input_name: INPUT__0
  triton_image_output_name: OUTPUT__0
  triton_image_datatype: FP32
  triton_text_model_name: ''
  triton_text_model_version: ''
  triton_text_input_name: INPUT__0
  triton_text_output_name: OUTPUT__0
  triton_text_datatype: INT64
  triton_timeout_sec: 60
  disable_text_cache: false
core_depth_midas:
  runtime: triton
  batch_size: 1
  triton_preprocess_preset: midas_256
  out_width: 256
  out_height: 256
  triton_http_url: ''
  triton_model_spec: ''
  triton_model_name: ''
  triton_model_version: ''
  triton_input_name: INPUT__0
  triton_output_name: OUTPUT__0
  triton_datatype: UINT8
  model_version: unknown
  weights_digest: unknown
  precision: fp32
  frames_bgr: false
core_optical_flow:
  runtime: triton
  triton_preprocess_preset: raft_256
  triton_http_url: ''
  triton_model_spec: ''
  triton_model_name: ''
  triton_model_version: ''
  triton_input0_name: INPUT0__0
  triton_input1_name: INPUT1__0
  triton_output_name: OUTPUT__0
  triton_datatype: UINT8
  model_version: unknown
  weights_digest: unknown
  precision: fp32
  batch_size: 16
core_object_detections:
  runtime: ultralytics
  model: yolo11x.pt
  batch_size: 1
  device: cuda
  box_threshold: 0.6
  iou-threshold: 0.3
  triton_model_spec: ''
  triton_http_url: ''
  triton_model_name: ''
  triton_model_version: ''
  triton_input_name: images
  triton_output_name: output0
  triton_preprocess_preset: yolo11x_640
content_domain:
  domain_db_dir: dp_models/bundled_models/semantics/content_domain/v1
  clip_text_model_spec: clip_text_triton
  topk: 5
  threshold_global: 0.23
  thresholds_json: ''
franchise_recognition:
  franchise_db_dir: dp_models/bundled_models/semantics/franchises/v1
  ocr_npz: 'null'
  clip_text_model_spec: clip_text_triton
  topk: 5
  threshold_global: 0.23
  max_full_labels: 500
  ocr_min_confidence: 0.4
  ocr_max_events: 5000
  thresholds_json: ''
scene_classification:
  runtime: triton
  triton_model_spec: places365_resnet50_224_triton
  batch_size: 1
  label_fusion: places
  enable_advanced_features: false
ocr_extractor:
  proposal_class: text_region
  min_det_score: 0.5
  max_boxes_per_frame: 5
  max_total_boxes: 5000
  crop_margin_frac: 0.02
  tesseract_lang: eng+rus
  tesseract_psm: 6
core_face_landmarks:
  use_pose: false
  use_hands: false
  use_face_mesh: true
  use_person_mask: true
  person_window_radius: 0
  face_detection_target_frames: 50
  face_detection_min_frames: 20
  face_detection_max_frames: 200
  face_detection_model_selection: 0
  face_detection_min_confidence: 0.5
  face_mesh_window_radius: ''
  pose_static_image_mode: false
  pose_model_complexity: 2
  pose_enable_segmentation: false
  pose_min_detection_confidence: 0.5
  pose_min_tracking_confidence: 0.5
  hands_static_image_mode: false
  hands_max_num_hands: 2
  hands_model_complexity: 1
  hands_min_detection_confidence: 0.5
  hands_min_tracking_confidence: 0.5
  face_mesh_static_image_mode: false
  face_mesh_max_num_faces: 1
  face_mesh_refine_landmarks: false
  face_mesh_min_detection_confidence: 0.5
  face_mesh_min_tracking_confidence: 0.5
  enable_async: true
  enable_parallel: false
  num_workers: 2
  enable_temporal_filter: true
  temporal_filter_min_cutoff: 1
  temporal_filter_beta: 0
  enable_profiling: true
place_semantics:
  places_db_dir: ''
  topk: 5
  threshold_global: 0
  thresholds_json: ''
brand_semantics:
  embedding_service_url: ''
  topk: 5
  similarity_threshold: 0
  max_tracks: ''
  max_dets_per_frame: ''
  pad_ratio: 0.15
  use_sharpness: false
car_semantics:
  embedding_service_url: ''
  topk: 5
  similarity_threshold: 0
  max_tracks: ''
  max_dets_per_frame: ''
  pad_ratio: 0.15
  use_sharpness: false
face_identity:
  embedding_service_url: ''
  topk: 5
  similarity_threshold: 0
