      - component_name: semantic_cluster_extractor
        owner_processor: text
        depends_on_components: [title_embedder, description_embedder, hashtag_embedder]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: topk_similar_titles_extractor
        owner_processor: text
        depends_on_components: [title_embedder]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: embedding_shift_indicator_extractor
        owner_processor: text
        depends_on_components: [transcript_chunk_embedder]
        soft_dependencies: []
