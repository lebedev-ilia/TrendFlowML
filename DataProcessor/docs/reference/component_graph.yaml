      - component_name: qa_embedding_pairs_extractor
        owner_processor: text
        depends_on_components: [transcript_chunk_embedder]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: embedding_pair_topk_extractor
        owner_processor: text
