# Component DAG (MVP) — source-of-truth
#
# Цель:
# - Декларативно описать зависимости (DAG) между компонентами/модулями на уровне DataProcessor,
#   чтобы построить "priority" как dependency-ordering и определить параллелизм.
# - В MVP хранится в репозитории. Позже мигрируем в БД профилей анализа.
#
# Важно:
# - Это НЕ runtime state. Runtime состояние пишется в state-files (`run_state.json`, `state_*.json`).
# - Здесь мы фиксируем именно "что зависит от чего".
#
# Формат MVP (пока черновой, будет расширяться по мере аудита модулей):

version: 0.1

stages:
  baseline:
    nodes:
      # --- Processor-level ---
      - component_name: segmenter
        owner_processor: segmenter
        depends_on_components: []
        soft_dependencies: []
        wait_on_checkpoints: []

      # --- Visual core providers (Tier-0) ---
      - component_name: core_clip
        owner_processor: visual
        depends_on_components: [segmenter]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: content_domain
        owner_processor: visual
        # Semantic head over core_clip embeddings. Sampling group: core_clip.frame_indices (Segmenter-owned).
        depends_on_components: [segmenter, core_clip]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: franchise_recognition
        owner_processor: visual
        # Semantic head over core_clip embeddings. Uses OCR if available, but must be robust without it.
        # Sampling group: core_clip.frame_indices (Segmenter-owned).
        depends_on_components: [segmenter, core_clip]
        soft_dependencies: [ocr_extractor]
        wait_on_checkpoints: []

      - component_name: ocr_extractor
        owner_processor: visual
        # OCR over text_region proposals (from core_object_detections). Optional consumer (soft dep).
        depends_on_components: [segmenter, core_object_detections]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: core_face_landmarks
        owner_processor: visual
        # Baseline policy: face_landmarks should run only on frames where a person is present.
        # Therefore it requires core_object_detections (no-fallback) for its sampling mask.
        depends_on_components: [segmenter, core_object_detections]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: core_object_detections
        owner_processor: visual
        depends_on_components: [segmenter]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: core_depth_midas
        owner_processor: visual
        depends_on_components: [segmenter]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: core_optical_flow
        owner_processor: visual
        depends_on_components: [segmenter]
        soft_dependencies: []
        wait_on_checkpoints: []

      # --- Visual modules (Tier-0) ---
      - component_name: cut_detection
        owner_processor: visual
        # Baseline policy: cut_detection must reuse motion from core_optical_flow (no-fallback).
        # Also depends on face_landmarks/object_detections for jump-cuts heuristics (fail-fast).
        depends_on_components: [segmenter, core_optical_flow, core_face_landmarks, core_object_detections]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: shot_quality
        owner_processor: visual
        depends_on_components:
          - segmenter
          - cut_detection
          - core_clip
          - core_depth_midas
          - core_object_detections
          - core_face_landmarks
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: scene_classification
        owner_processor: visual
        # NOTE: In baseline, scene_classification is strictly core_clip-dependent (no-fallback).
        # It requires core_clip embeddings for every processed frame, so sampling must be aligned.
        depends_on_components: [segmenter, core_clip]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: video_pacing
        owner_processor: visual
        depends_on_components: [segmenter, core_optical_flow, core_clip]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: uniqueness
        owner_processor: visual
        depends_on_components: [segmenter, core_clip]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: story_structure
        owner_processor: visual
        depends_on_components: [segmenter, core_clip, core_optical_flow, core_face_landmarks]
        soft_dependencies: []
        wait_on_checkpoints: []

      # --- Visual semantic heads (core_identity) ---
      - component_name: brand_semantics
        owner_processor: visual
        depends_on_components: [segmenter, core_object_detections, core_clip]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: car_semantics
        owner_processor: visual
        depends_on_components: [segmenter, core_object_detections, core_clip]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: place_semantics
        owner_processor: visual
        depends_on_components: [segmenter, core_object_detections, core_clip]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: face_identity
        owner_processor: visual
        depends_on_components: [segmenter, core_face_landmarks]
        soft_dependencies: []
        wait_on_checkpoints: []

      # --- Visual modules (extended baseline) ---
      - component_name: color_light
        owner_processor: visual
        depends_on_components: [segmenter, scene_classification]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: action_recognition
        owner_processor: visual
        depends_on_components: [segmenter, core_object_detections]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: behavioral
        owner_processor: visual
        depends_on_components: [segmenter, core_face_landmarks]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: emotion_face
        owner_processor: visual
        depends_on_components: [segmenter, core_face_landmarks]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: detalize_face
        owner_processor: visual
        depends_on_components: [segmenter, core_face_landmarks]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: micro_emotion
        owner_processor: visual
        depends_on_components: [segmenter, core_face_landmarks]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: frames_composition
        owner_processor: visual
        depends_on_components: [segmenter, core_object_detections, core_face_landmarks, core_depth_midas]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: high_level_semantic
        owner_processor: visual
        depends_on_components: [segmenter, core_clip, cut_detection, emotion_face]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: optical_flow
        owner_processor: visual
        # Module-level analytics over core_optical_flow (not core provider itself).
        depends_on_components: [segmenter, core_optical_flow]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: similarity_metrics
        owner_processor: visual
        depends_on_components: [segmenter, core_clip]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: text_scoring
        owner_processor: visual
        depends_on_components: [segmenter]
        soft_dependencies: [ocr_extractor, core_face_landmarks]
        wait_on_checkpoints: []

      # --- Audio tier-0 (optional in baseline profile) ---
      - component_name: clap_extractor
        owner_processor: audio
        depends_on_components: [segmenter]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: loudness_extractor
        owner_processor: audio
        depends_on_components: [segmenter]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: tempo_extractor
        owner_processor: audio
        depends_on_components: [segmenter]
        soft_dependencies: []
        wait_on_checkpoints: []

  # --- Audio non-baseline / prod-important (audited, but not in baseline DAG) ---
  audio_extended:
    nodes:
      # segmenter duplicated per-stage (validator requires deps in same stage)
      - component_name: segmenter
        owner_processor: segmenter
        depends_on_components: []
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: asr_extractor
        owner_processor: audio
        depends_on_components: [segmenter]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: speaker_diarization_extractor
        owner_processor: audio
