        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: emotion_diarization_extractor
        owner_processor: audio
        depends_on_components: [segmenter]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: source_separation_extractor
        owner_processor: audio
        depends_on_components: [segmenter]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: speech_analysis_extractor
        owner_processor: audio
        depends_on_components: [segmenter]
        soft_dependencies: []
        wait_on_checkpoints: []

  # --- TextProcessor (Audit v3): Tier-0 + embedders, зависящие от очистки тегов ---
  text_processor_tier0:
    nodes:
      - component_name: tags_extractor
        owner_processor: text
        depends_on_components: []
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: lexico_static_features
        owner_processor: text
        depends_on_components: [tags_extractor]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: asr_text_proxy_audio_features
        owner_processor: text
        depends_on_components: [tags_extractor]
        soft_dependencies: [asr_extractor]
        wait_on_checkpoints: []

      - component_name: title_embedder
        owner_processor: text
        depends_on_components: [tags_extractor]
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: description_embedder
        owner_processor: text
        depends_on_components: [tags_extractor]
        soft_dependencies: []
        wait_on_checkpoints: []

  # --- TextProcessor: all 22 extractors (Audit v3 MainProcessor DEPENDENCIES) ---
  text_processor_full:
    nodes:
      - component_name: tags_extractor
        owner_processor: text
        depends_on_components: []
        soft_dependencies: []
        wait_on_checkpoints: []

      - component_name: lexico_static_features
        owner_processor: text
        depends_on_components: [tags_extractor]
        soft_dependencies: []
