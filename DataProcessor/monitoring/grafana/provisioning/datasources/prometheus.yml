# Grafana Datasource Provisioning
#
# Этот файл настраивает автоматическое подключение Prometheus как datasource в Grafana.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "10s"
      queryTimeout: "60s"
      httpMethod: "POST"

