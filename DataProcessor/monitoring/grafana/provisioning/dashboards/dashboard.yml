# Grafana Dashboard Provisioning
#
# Этот файл настраивает автоматическую загрузку дашбордов в Grafana.

apiVersion: 1

providers:
  - name: 'DataProcessor Dashboards'
    orgId: 1
    folder: 'DataProcessor'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: true

