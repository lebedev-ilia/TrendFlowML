[pytest]
# Pytest конфигурация для DataProcessor API тестов

# Пути для поиска тестов
testpaths = api/tests

# Паттерны для поиска тестов
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Опции по умолчанию
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=api
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=80

# Маркеры
markers =
    unit: Unit тесты для отдельных компонентов
    integration: Integration тесты для endpoints
    slow: Медленные тесты (требуют внешних зависимостей)
    redis: Тесты, требующие Redis
    storage: Тесты, требующие Storage

# Асинхронные тесты
asyncio_mode = auto

# Игнорирование путей
norecursedirs = .git .venv venv __pycache__ *.egg

