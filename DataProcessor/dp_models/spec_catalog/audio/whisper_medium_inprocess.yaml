model_name: whisper_medium_inprocess
model_version: "1"
role: asr_whisper
runtime: inprocess
engine: torch
precision: fp16
device_policy: cuda
weights_digest: auto
local_artifacts:
  - path: audio/whisper/medium.pt
    kind: file
runtime_params:
  factory: dp_models.factories.audio:create_whisper_model
  factory_kwargs:
    model_size: medium
  checkpoint_relpath: audio/whisper/medium.pt
  state_dict_key: state_dict
  strict: true
  strip_prefix: null

