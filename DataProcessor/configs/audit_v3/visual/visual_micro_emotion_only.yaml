core_providers:
  core_clip: false
  core_optical_flow: false
  core_depth_midas: false
  core_object_detections: true
  ocr_extractor: false
  core_face_landmarks: true
  content_domain: false
  franchise_recognition: false
  brand_semantics: false
  car_semantics: false
  face_identity: false
  place_semantics: false

modules:
  cut_detection: false
  scene_classification: false
  video_pacing: false
  uniqueness: false
  shot_quality: false
  story_structure: false
  detalize_face: false
  emotion_face: false
  behavioral: false
  optical_flow: false
  action_recognition: false
  color_light: false
  frames_composition: false
  high_level_semantic: false
  micro_emotion: true
  similarity_metrics: false
  text_scoring: false

global:
  triton_http_url: "http://localhost:8000"

core_object_detections:
  runtime: "ultralytics"
  model: "visual/yolo/yolo11x_41_best.pt"
  batch_size: 16
  device: "cuda"
  render:
    enable_render: true
    enable_html_render: true

core_face_landmarks:
  use_face_mesh: true
  use_person_mask: true
  render:
    enable_render: true
    enable_html_render: true

micro_emotion:
  fps: 30
  microexpr_smoothing_sigma: 0.05
  microexpr_delta_threshold: 0.4
  microexpr_max_duration_frames: 15
  microexpr_min_peak_distance_frames: 6
  gaze_centered_threshold: 10.0
  pca_components: 3
  au_confidence_threshold: 0.5
  feature_groups: "default"
  openface_batch_size: 64
  docker_image: "openface/openface:latest"
  device: "cuda"
  progress_every_frames: 50
  render:
    enable_render: true
    enable_html_render: true

