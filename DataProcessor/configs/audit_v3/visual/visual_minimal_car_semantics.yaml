# Minimal: core_object_detections -> car_semantics (embedding service)
# cd DataProcessor && VisualProcessor/.vp_venv/bin/python VisualProcessor/main.py --cfg-path configs/audit_v3/visual/visual_minimal_car_semantics.yaml
# Требуется: YOLO weights, EMBEDDING_SERVICE_URL (часто :8005), DP_MODELS_ROOT
# 2026-04-22 на -Q6fnPIybEI: empty_reason=no_car_proposals (нет car-детекций в proposals).

global:
  triton_http_url: "http://127.0.0.1:8010"
  frames_dir: "../storage/frames_dir/-Q6fnPIybEI/video"
  rs_path: "../storage/result_store_car_minimal"
  platform_id: "youtube"
  run_id: "car_minimal_cli_001"
  sampling_policy_version: "v1"
  dataprocessor_version: "unknown"

core_providers:
  core_clip: false
  core_depth_midas: false
  core_optical_flow: false
  core_object_detections: true
  ocr_extractor: false
  core_face_landmarks: false
  content_domain: false
  franchise_recognition: false
  brand_semantics: false
  car_semantics: true
  face_identity: false
  place_semantics: false

modules:
  cut_detection: false
  scene_classification: false
  video_pacing: false
  uniqueness: false
  shot_quality: false
  story_structure: false
  detalize_face: false
  emotion_face: false
  behavioral: false
  optical_flow: false
  action_recognition: false
  color_light: false
  frames_composition: false
  high_level_semantic: false
  micro_emotion: false
  similarity_metrics: false
  text_scoring: false

core_object_detections:
  runtime: "ultralytics"
  model: "visual/yolo/yolo11x_41_best.pt"
  batch_size: 16
  device: "cuda"
  box_threshold: 0.6
  iou_threshold: 0.3
  triton_model_spec: ""
  triton_http_url: ""
  triton_model_name: ""
  triton_model_version: ""
  triton_input_name: "images"
  triton_output_name: "output0"
  triton_preprocess_preset: "yolo11x_640"
  render:
    enable_render: true
    enable_html_render: true

car_semantics:
  embedding_service_url: "http://127.0.0.1:8005"
  topk: 5
  similarity_threshold: 0
  max_tracks: ""
  max_dets_per_frame: ""
  pad_ratio: 0.15
  use_sharpness: false
  render:
    enable_render: true
    enable_html_render: true
