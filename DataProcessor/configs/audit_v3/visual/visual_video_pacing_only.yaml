core_providers:
  core_clip: true
  core_optical_flow: true
  core_depth_midas: false
  core_object_detections: false
  ocr_extractor: false
  core_face_landmarks: false
  content_domain: false
  franchise_recognition: false
  brand_semantics: false
  car_semantics: false
  face_identity: false
  place_semantics: false

modules:
  cut_detection: true
  scene_classification: false
  video_pacing: true
  uniqueness: false
  shot_quality: false
  story_structure: false
  detalize_face: false
  emotion_face: false
  behavioral: false
  optical_flow: false
  action_recognition: false
  color_light: false
  frames_composition: false
  high_level_semantic: false
  micro_emotion: false
  similarity_metrics: false
  text_scoring: false

global:
  triton_http_url: "http://localhost:8000"

core_clip:
  runtime: "inprocess"
  model_name: "ViT-B/32"
  batch_size: 16
  render:
    enable_render: true
    enable_html_render: true

core_optical_flow:
  runtime: "triton"
  triton_model_spec: "raft_256_triton"
  batch_size: 1
  render:
    enable_render: true
    enable_html_render: true

cut_detection:
  no_use_clip: true
  render:
    enable_render: true
    enable_html_render: true

video_pacing:
  downscale_factor: 0.25
  min_shot_length_seconds: 0.15
  shot_detect_k: 6.0
  min_frames: 30
  enable_entropy_features: false
  enable_histograms: false
  enable_pace_curve_peaks: false
  enable_periodicity: false
  enable_bursts: false
  render:
    enable_render: true
    enable_html_render: true

