core_providers:
  core_clip: false
  core_depth_midas: false
  core_optical_flow: false
  core_object_detections: true
  ocr_extractor: true
  core_face_landmarks: false
  content_domain: false
  franchise_recognition: false
  brand_semantics: false
  car_semantics: false
  face_identity: false
  place_semantics: false

modules:
  cut_detection: false
  scene_classification: false
  video_pacing: false
  uniqueness: false
  shot_quality: false
  story_structure: false
  detalize_face: false
  emotion_face: false
  behavioral: false
  optical_flow: false
  action_recognition: false
  color_light: false
  frames_composition: false
  high_level_semantic: false
  micro_emotion: false
  similarity_metrics: false
  text_scoring: false

global:
  # Used by dp_models Triton specs via ${TRITON_HTTP_URL} (not required for ultralytics runtime).
  triton_http_url: "http://localhost:8000"

core_object_detections:
  runtime: "ultralytics"
  model: "visual/yolo/yolo11x_41_best.pt"  # Relative to DP_MODELS_ROOT
  batch_size: 16
  device: "cuda"  # cuda|cpu|auto
  box_threshold: 0.6
  iou_threshold: 0.3
  # Kept for compatibility (unused in ultralytics runtime)
  triton_model_spec: ""
  triton_http_url: ""
  triton_model_name: ""
  triton_model_version: ""
  triton_input_name: "images"
  triton_output_name: "output0"
  triton_preprocess_preset: "yolo11x_640"
  render:
    enable_render: true
    enable_html_render: true

ocr_extractor:
  # Engine selection (Audit v3): use ONNX recognizer via dp_models (recommended).
  engine: "ppocr_rec_onnx"
  rec_model_spec: "ppocr_rec_onnx_v1_inprocess"
  ppocr_img_h: 48
  ppocr_img_w: 320
  min_rec_score: 0.0
  proposal_class: "text_region"
  min_det_score: 0.5
  max_boxes_per_frame: 5
  max_total_boxes: 5000
  crop_margin_frac: 0.02
  tesseract_lang: "eng+rus"
  tesseract_psm: 6
  # Audit v3 privacy default is false; for this dev-run we keep raw text for inspection.
  retain_raw_ocr_text: true
  render:
    enable_render: true
    enable_html_render: true


