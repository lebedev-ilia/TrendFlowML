core_providers:
  core_clip: true
  core_depth_midas: true
  core_optical_flow: true
  core_object_detections: true
  ocr_extractor: true
  core_face_landmarks: false
  content_domain: false
  franchise_recognition: false
  brand_semantics: false
  car_semantics: false
  face_identity: false
  place_semantics: false

modules:
  cut_detection: false
  scene_classification: false
  video_pacing: false
  uniqueness: false
  shot_quality: false
  story_structure: false
  detalize_face: false
  emotion_face: false
  behavioral: false
  optical_flow: false
  action_recognition: false
  color_light: false
  frames_composition: false
  high_level_semantic: false
  micro_emotion: false
  similarity_metrics: false
  text_scoring: false

global:
  triton_http_url: "http://localhost:8000"

core_clip:
  runtime: "triton"
  batch_size: 16
  triton_preprocess_preset: "openai_clip_224"
  triton_image_model_spec: "clip_image_224_triton"
  triton_text_model_spec: "clip_text_triton"
  disable_text_cache: false
  render:
    enable_render: true
    enable_html_render: true

core_depth_midas:
  runtime: "triton"
  batch_size: 16
  triton_preprocess_preset: "midas_256"
  out_width: 256
  out_height: 256
  triton_model_spec: "midas_256_triton"
  frames_bgr: false
  render:
    enable_render: true
    enable_html_render: true

core_optical_flow:
  runtime: "triton"
  triton_preprocess_preset: "raft_256"
  triton_model_spec: "raft_256_triton"
  batch_size: 16
  render:
    enable_render: true
    enable_html_render: true

core_object_detections:
  runtime: "ultralytics"
  model: "visual/yolo/yolo11x_41_best.pt"
  batch_size: 16
  device: "cuda"
  box_threshold: 0.6
  iou_threshold: 0.3
  triton_preprocess_preset: "yolo11x_640"
  render:
    enable_render: true
    enable_html_render: true

ocr_extractor:
  engine: "ppocr_rec_onnx"
  rec_model_spec: "ppocr_rec_onnx_v1_inprocess"
  ppocr_img_h: 48
  ppocr_img_w: 320
  min_rec_score: 0.0
  proposal_class: "text_region"
  min_det_score: 0.5
  max_boxes_per_frame: 5
  max_total_boxes: 5000
  crop_margin_frac: 0.02
  retain_raw_ocr_text: true  # dev-only run; set false for production
  render:
    enable_render: true
    enable_html_render: true

