# scene_classification + color_light: INPROCESS-цепочка БЕЗ Triton (Claude, 2026-07-12).
# color_light (CPU-only) зависит от scene_classification (ось Segmenter). Оркестратор гонит
# core_clip(inprocess)→cut_detection(farneback)→scene_classification→color_light по зависимостям.
# Один прогон даёт и scene_classification, и color_light NPZ поверх общего frames_dir.
core_providers:
  core_clip: true            # inprocess ViT-B/32
  core_optical_flow: false
  core_object_detections: false
  core_depth_midas: false
  core_face_landmarks: false
  ocr_extractor: false
  content_domain: false
  franchise_recognition: false
  brand_semantics: false
  car_semantics: false
  face_identity: false
  place_semantics: false

modules:
  cut_detection: true
  scene_classification: true
  video_pacing: false
  uniqueness: false
  shot_quality: false
  story_structure: false
  detalize_face: false
  emotion_face: false
  behavioral: false
  optical_flow: false
  action_recognition: false
  color_light: true
  frames_composition: false
  high_level_semantic: false
  micro_emotion: false
  similarity_metrics: false
  text_scoring: false

global: {}

core_clip:
  runtime: "inprocess"
  model_name: "ViT-B/32"
  batch_size: 16
  render: { enable_render: false, enable_html_render: false }

cut_detection:
  no_use_clip: true
  render: { enable_render: false, enable_html_render: false }

scene_classification:
  enable_advanced_features: true
  label_fusion: "places"
  render: { enable_render: false, enable_html_render: false }

color_light:
  store_debug_objects: 1
  render: { enable_render: false, enable_html_render: false }
