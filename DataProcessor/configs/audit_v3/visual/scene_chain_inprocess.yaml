# scene_classification: минимальная INPROCESS-цепочка БЕЗ Triton (Claude, 2026-07-05).
# Находка: core_clip умеет inprocess (clip.load ViT-B/32), cut_detection — no_use_clip=true,
# единственный Triton-потребитель штатного профиля (core_optical_flow=raft_triton) здесь ОТКЛЮЧЁН →
# cut_detection уходит на внутренний farneback (opencv). Так вся цепочка core_clip→cut_detection→scene
# гонится на GPU без Triton. Если farneback-путь cut_detection не заведётся из оркестратора — fallback:
# включить core_optical_flow (triton raft) и поднять Triton (e2e_triton_docker.sh).
core_providers:
  core_clip: true            # inprocess ViT-B/32 (openai clip; веса скачиваются публично)
  core_optical_flow: false   # ОТКЛЮЧЕНО (был единственный Triton-потребитель)
  core_object_detections: false
  core_depth_midas: false
  core_face_landmarks: false
  ocr_extractor: false
  content_domain: false
  franchise_recognition: false
  brand_semantics: false
  car_semantics: false
  face_identity: false
  place_semantics: false

modules:
  cut_detection: true
  scene_classification: true
  video_pacing: false
  uniqueness: false
  shot_quality: false
  story_structure: false
  detalize_face: false
  emotion_face: false
  behavioral: false
  optical_flow: false
  action_recognition: false
  color_light: false
  frames_composition: false
  high_level_semantic: false
  micro_emotion: false
  similarity_metrics: false
  text_scoring: false

global: {}

core_clip:
  runtime: "inprocess"
  model_name: "ViT-B/32"
  batch_size: 16
  render: { enable_render: false, enable_html_render: false }

cut_detection:
  no_use_clip: true
  # farneback-fallback: cut_detection по умолчанию require_core_optical_flow=true → при отключённом
  # optical_flow запускать его main.py с --no-require-core-optical-flow (пробросить в раннере).
  render: { enable_render: false, enable_html_render: false }

scene_classification:
  enable_advanced_features: true   # эстетика/атмосфера из core_clip (inprocess) — Triton не нужен
  label_fusion: "places"           # сравнение places vs clip — двумя прогонами
  render: { enable_render: false, enable_html_render: false }
