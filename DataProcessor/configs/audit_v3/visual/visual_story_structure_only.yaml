core_providers:
  core_clip: true
  core_depth_midas: false
  core_optical_flow: true
  core_object_detections: true
  ocr_extractor: false
  core_face_landmarks: true
  content_domain: false
  franchise_recognition: false
  brand_semantics: false
  car_semantics: false
  face_identity: false
  place_semantics: false

modules:
  cut_detection: false
  scene_classification: false
  video_pacing: false
  uniqueness: false
  shot_quality: false
  story_structure: true
  detalize_face: false
  emotion_face: false
  behavioral: false
  optical_flow: false
  action_recognition: false
  color_light: false
  frames_composition: false
  high_level_semantic: false
  micro_emotion: false
  similarity_metrics: false
  text_scoring: false

global:
  triton_http_url: "http://localhost:8000"

core_clip:
  runtime: "inprocess"
  model_name: "ViT-B/32"
  batch_size: 16
  render:
    enable_render: true
    enable_html_render: true

core_optical_flow:
  runtime: "triton"
  triton_model_spec: "raft_256_triton"
  batch_size: 1
  render:
    enable_render: true
    enable_html_render: true

core_object_detections:
  runtime: "ultralytics"
  model: "visual/yolo/yolo11x_41_best.pt"
  batch_size: 16
  device: "cuda"
  box_threshold: 0.6
  iou_threshold: 0.3
  render:
    enable_render: true
    enable_html_render: true

core_face_landmarks:
  use_face_mesh: true
  use_person_mask: true
  render:
    enable_render: true
    enable_html_render: true

story_structure:
  min_frames: 30
  max_frames: 200
  energy_smoothing_sigma: 1.0
  text_mode: "none"  # отключаем OCR/topic-shift для audit-тестов
  clip_text_model_spec: "clip_text_triton"
  clip_text_batch_size: 64
  ocr_max_chars_per_frame: 256
  render:
    enable_render: true
    enable_html_render: true
