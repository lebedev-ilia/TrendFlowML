core_providers:
  core_clip: false
  core_depth_midas: true
  core_optical_flow: false
  core_object_detections: true
  ocr_extractor: false
  core_face_landmarks: true
  content_domain: false
  franchise_recognition: false
  brand_semantics: false
  car_semantics: false
  face_identity: false
  place_semantics: false

modules:
  cut_detection: false
  scene_classification: false
  video_pacing: false
  uniqueness: false
  shot_quality: false
  story_structure: false
  detalize_face: false
  emotion_face: false
  behavioral: false
  optical_flow: false
  action_recognition: false
  color_light: false
  frames_composition: true
  high_level_semantic: false
  micro_emotion: false
  similarity_metrics: false
  text_scoring: false

global:
  triton_http_url: "http://localhost:8000"

core_object_detections:
  runtime: "ultralytics"
  model: "visual/yolo/yolo11x_41_best.pt"
  batch_size: 16
  device: "cuda"
  box_threshold: 0.6
  iou_threshold: 0.3
  render:
    enable_render: true
    enable_html_render: true

core_face_landmarks:
  use_face_mesh: true
  use_person_mask: true
  render:
    enable_render: true
    enable_html_render: true

core_depth_midas:
  runtime: "triton"
  batch_size: 8
  triton_preprocess_preset: "midas_256"
  out_width: 256
  out_height: 256
  triton_model_spec: "midas_256_triton"
  frames_bgr: false
  render:
    enable_render: true
    enable_html_render: true

frames_composition:
  feature_set: "default"
  num_workers: null
  render:
    enable_render: true
    enable_html_render: true

