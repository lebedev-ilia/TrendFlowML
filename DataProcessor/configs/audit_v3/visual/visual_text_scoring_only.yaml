core_providers:
  core_clip: false
  core_depth_midas: false
  core_optical_flow: false
  core_object_detections: true
  ocr_extractor: true
  core_face_landmarks: false
  content_domain: false
  franchise_recognition: false
  brand_semantics: false
  car_semantics: false
  face_identity: false
  place_semantics: false

modules:
  cut_detection: false
  scene_classification: false
  video_pacing: false
  uniqueness: false
  shot_quality: false
  story_structure: false
  detalize_face: false
  emotion_face: false
  behavioral: false
  optical_flow: false
  action_recognition: false
  color_light: false
  frames_composition: false
  high_level_semantic: false
  micro_emotion: false
  similarity_metrics: false
  text_scoring: true

global:
  triton_http_url: "http://localhost:8000"

core_object_detections:
  runtime: "ultralytics"
  model: "visual/yolo/yolo11x_41_best.pt"
  batch_size: 16
  device: "cuda"
  render:
    enable_render: true
    enable_html_render: true

ocr_extractor:
  engine: "ppocr_rec_onnx"
  rec_model_spec: "ppocr_rec_onnx_v1_inprocess"
  render:
    enable_render: true
    enable_html_render: true

# core_face_landmarks: отключен, так как use_face_data=false в text_scoring
# core_face_landmarks:
#   use_face_mesh: true
#   use_person_mask: true
#   render:
#     enable_render: true
#     enable_html_render: true

text_scoring:
  use_face_data: false
  use_motion_data: false
  alignment_window_seconds: 0.5
  motion_weight: 0.0
  face_weight: 1.0
  audio_weight: 0.0
  min_ocr_confidence: 0.4
  retain_raw_ocr_text: false
  store_debug_objects: false
  enable_text_peaks: false
  enable_language_entropy: false
  enable_text_movement_speed: false
  render:
    enable_render: true
    enable_html_render: true

