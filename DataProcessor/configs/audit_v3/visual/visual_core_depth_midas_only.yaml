core_providers:
  core_clip: false
  core_depth_midas: true
  core_optical_flow: false
  core_object_detections: false
  ocr_extractor: false
  core_face_landmarks: false
  content_domain: false
  franchise_recognition: false
  brand_semantics: false
  car_semantics: false
  face_identity: false
  place_semantics: false

modules:
  cut_detection: false
  scene_classification: false
  video_pacing: false
  uniqueness: false
  shot_quality: false
  story_structure: false
  detalize_face: false
  emotion_face: false
  behavioral: false
  optical_flow: false
  action_recognition: false
  color_light: false
  frames_composition: false
  high_level_semantic: false
  micro_emotion: false
  similarity_metrics: false
  text_scoring: false

global:
  triton_http_url: "http://localhost:8000"

# Triton-free inprocess MiDaS (same v3 artifact/schema as Triton path).
core_depth_midas:
  runtime: "inprocess"
  inprocess_model: "MiDaS_small"
  batch_size: 8
  triton_preprocess_preset: "midas_256"
  out_width: 256
  out_height: 256
  frames_bgr: false
  render:
    enable_render: true
    enable_html_render: true
