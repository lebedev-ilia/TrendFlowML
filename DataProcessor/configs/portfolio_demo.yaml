# Portfolio / prod-like local demo (лёгкий multimodal path)
#
# Запуск (из корня репо):
#   export DP_MODELS_ROOT="/abs/path/to/DataProcessor/dp_models/bundled_models"
#   python3 DataProcessor/main.py \
#     --video-path example/example_videos/-Q6fnPIybEI.mp4 \
#     --global-config DataProcessor/configs/portfolio_demo.yaml \
#     --platform-id youtube --video-id portfolio_demo --run-id run_1 \
#     --rs-base DataProcessor/dp_results/portfolio_demo
#
# Visual (отдельно, нужны frames_dir + GPU для action_recognition):
#   см. configs/audit_v3/visual/visual_minimal_object_detections_action_recognition.yaml
#
# Полный smoke audio: scripts/run_smoke_all_components.sh

version: "1.0.0"

global:
  platform_id: "youtube"
  sampling_policy_version: "v1"
  dataprocessor_version: "portfolio_demo"
  scheduler:
    max_parallel_runs: 1
    resource_limits:
      cpu_cores: 4
      ram_gb: null
      vram_gb: null

processors:
  audio:
    enabled: true
    required: false
    device: "auto"
    scheduler:
      segment_parallelism: 2
      max_inflight: 2
      clap_batch_size: 8
    batch_processing:
      enabled: false
    extractors:
      clap:
        enabled: true
      tempo:
        enabled: true
      loudness:
        enabled: true
      asr:
        enabled: false
      emotion_diarization:
        enabled: false
      speaker_diarization:
        enabled: false
      source_separation:
        enabled: false
      speech_analysis:
        enabled: false
      band_energy:
        enabled: false
      chroma:
        enabled: false
      hpss:
        enabled: false
      key:
        enabled: false
      mel:
        enabled: false
      mfcc:
        enabled: false
      onset:
        enabled: false
      pitch:
        enabled: false
      quality:
        enabled: false
      rhythmic:
        enabled: false
      spectral:
        enabled: false
      spectral_entropy:
        enabled: false
      voice_quality:
        enabled: false

  text:
    enabled: false
    required: false

  visual:
    enabled: false
    required: false
