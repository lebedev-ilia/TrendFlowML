version: '3.8'

services:
  postgres:
    # pgvector: нужен Embedding Service (VisualProcessor: franchise/car/place/face и др.)
    image: pgvector/pgvector:pg15
    container_name: fetcher-postgres
    environment:
      POSTGRES_USER: fetcher
      POSTGRES_PASSWORD: fetcher_password
      POSTGRES_DB: fetcher_db
    ports:
      # 5433 на хосте, чтобы не конфликтовать с CVAT (cvat_db на 5432)
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fetcher"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fetcher-network

  redis:
    image: redis:7-alpine
    container_name: fetcher-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - fetcher-network

  minio:
    image: minio/minio:latest
    container_name: fetcher-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - fetcher-network

  # Fetcher API service (опционально, для разработки)
  fetcher-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fetcher-api
    environment:
      # Database (FetcherSettings expects FETCHER_POSTGRES_DSN)
      FETCHER_POSTGRES_DSN: postgresql+psycopg2://fetcher:fetcher_password@postgres:5432/fetcher_db
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: fetcher
      POSTGRES_PASSWORD: fetcher_password
      POSTGRES_DB: fetcher_db
      POSTGRES_SSL_MODE: disable
      # Redis (FetcherSettings expects FETCHER_REDIS_URL)
      FETCHER_REDIS_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      REDIS_SSL: "false"
      # MinIO/S3 (FetcherSettings expects FETCHER_S3_*/FETCHER_BUCKET_RAW)
      FETCHER_S3_ENDPOINT_URL: http://minio:9000
      FETCHER_S3_ACCESS_KEY: minioadmin
      FETCHER_S3_SECRET_KEY: minioadmin123
      FETCHER_BUCKET_RAW: video-analytics-raw
      FETCHER_S3_USE_SSL: "false"
      FETCHER_S3_VERIFY_SSL: "false"
      # YouTube normalization (disable yt-dlp network calls in local dev)
      FETCHER_YOUTUBE_USE_YT_DLP: "false"
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin123
      S3_BUCKET_RAW: video-analytics-raw
      S3_USE_SSL: "false"
      S3_VERIFY_SSL: "false"
      # Celery
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - fetcher-network
    volumes:
      - .:/app
    command: uvicorn fetcher.api:app --host 0.0.0.0 --port 8000 --reload

  # Celery worker (опционально, для разработки)
  fetcher-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fetcher-worker
    environment:
      # Database (FetcherSettings expects FETCHER_POSTGRES_DSN)
      FETCHER_POSTGRES_DSN: postgresql+psycopg2://fetcher:fetcher_password@postgres:5432/fetcher_db
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: fetcher
      POSTGRES_PASSWORD: fetcher_password
      POSTGRES_DB: fetcher_db
      POSTGRES_SSL_MODE: disable
      # Redis (FetcherSettings expects FETCHER_REDIS_URL)
      FETCHER_REDIS_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      REDIS_SSL: "false"
      # MinIO/S3 (FetcherSettings expects FETCHER_S3_*/FETCHER_BUCKET_RAW)
      FETCHER_S3_ENDPOINT_URL: http://minio:9000
      FETCHER_S3_ACCESS_KEY: minioadmin
      FETCHER_S3_SECRET_KEY: minioadmin123
      FETCHER_BUCKET_RAW: video-analytics-raw
      FETCHER_S3_USE_SSL: "false"
      FETCHER_S3_VERIFY_SSL: "false"
      # YouTube normalization (disable yt-dlp network calls in local dev)
      FETCHER_YOUTUBE_USE_YT_DLP: "false"
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin123
      S3_BUCKET_RAW: video-analytics-raw
      S3_USE_SSL: "false"
      S3_VERIFY_SSL: "false"
      # Celery
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - fetcher-network
    volumes:
      - .:/app
    # Слушать все очереди пайплайна (API шлёт в fetcher.normal; остальные — из цепочки задач)
    command: celery -A fetcher.celery_app worker --loglevel=info --concurrency=4 -Q fetcher.high,fetcher.normal,fetcher.low,fetch.metadata,fetch.video,fetch.comments,fetch.finalize,fetch.maintenance

  # Celery beat (опционально, для периодических задач)
  fetcher-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fetcher-beat
    environment:
      # Database (FetcherSettings expects FETCHER_POSTGRES_DSN)
      FETCHER_POSTGRES_DSN: postgresql+psycopg2://fetcher:fetcher_password@postgres:5432/fetcher_db
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: fetcher
      POSTGRES_PASSWORD: fetcher_password
      POSTGRES_DB: fetcher_db
      POSTGRES_SSL_MODE: disable
      # Redis (FetcherSettings expects FETCHER_REDIS_URL)
      FETCHER_REDIS_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      REDIS_SSL: "false"
      # Celery
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fetcher-network
    volumes:
      - .:/app
    command: celery -A fetcher.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  fetcher-network:
    driver: bridge

