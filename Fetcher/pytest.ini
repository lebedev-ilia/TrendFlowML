[pytest]
# Pytest конфигурация для Fetcher тестов

# Пути для поиска тестов
testpaths = tests

# Паттерны для поиска тестов
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Опции по умолчанию
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=fetcher
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=5

# Маркеры
markers =
    unit: Unit тесты для отдельных компонентов
    integration: Integration тесты для endpoints и pipeline
    slow: Медленные тесты (требуют внешних зависимостей)
    redis: Тесты, требующие Redis
    storage: Тесты, требующие Storage
    database: Тесты, требующие PostgreSQL
    idempotency: Тесты идемпотентности
    resume: Тесты resume после сбоя
    chaos: Chaos тесты для проверки устойчивости
    e2e: E2E тесты (API + pipeline до manifest)

# Асинхронные тесты
asyncio_mode = auto

# Игнорирование путей
norecursedirs = .git .venv venv __pycache__ *.egg alembic

