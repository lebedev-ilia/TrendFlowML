# Local monitoring for Dataset Collector discover (--metrics-port 9095 on host).
#
#   cd Fetcher/monitoring
#   docker compose up -d
#
# Grafana:  http://127.0.0.1:3001  (admin / admin)
# Prometheus: http://127.0.0.1:9090

services:
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: dataset-collector-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: dataset-collector-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/dataset-collector.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
