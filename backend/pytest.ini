[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_functions = test_*

# Маркеры для выборочного запуска: pytest -m unit, pytest -m integration, pytest -m e2e
markers =
    unit: Unit tests (моки, без внешних сервисов).
    integration: Integration tests (API + сервисы или тестовая БД).
    api: HTTP/API tests (подмножество integration, FastAPI TestClient).
    contract: Contract tests (payload/схемы между Backend и DataProcessor).
    e2e: E2E ingestion (Backend ↔ Fetcher flow, мок Fetcher; ручной чеклист в docs/E2E_YOUTUBE_INGESTION_CHECKLIST.md).
