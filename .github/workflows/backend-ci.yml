# CI для Backend: запуск pytest (unit, integration, contract).
# См. backend/docs/TESTING_PLAN.md § 3.9.1, backend/docs/TESTING.md.

name: Backend CI

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        run: ruff check app

      - name: Run tests
        env:
          TF_BACKEND_JWT_SECRET: ci-secret-do-not-use-in-production
          TF_BACKEND_DB_DSN: postgresql+psycopg://u:p@localhost/db
          TF_BACKEND_REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml --no-cov-on-fail

      - name: Upload coverage.xml
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: backend/coverage.xml
          if-no-files-found: warn
