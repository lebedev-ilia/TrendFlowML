# Ingress for the Backend API (and optionally DataProcessor API for internal use).
# Requires an ingress controller (nginx, traefik, cloud LB). Adjust host + TLS.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trendflow-ingress
  namespace: trendflow
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"        # allow large uploads
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: nginx
  # tls:
  # - hosts: [api.trendflow.example.com]
  #   secretName: trendflow-tls
  rules:
  - host: api.trendflow.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
