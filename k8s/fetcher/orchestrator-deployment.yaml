apiVersion: apps/v1
kind: Deployment
metadata:
  name: fetcher-orchestrator
  labels:
    app: fetcher
    component: orchestrator
spec:
  replicas: 2  # Начать с 2 реплик для HA
  selector:
    matchLabels:
      app: fetcher
      component: orchestrator
  template:
    metadata:
      labels:
        app: fetcher
        component: orchestrator
    spec:
      containers:
      - name: orchestrator
        image: trendflow-fetcher:latest  # Замените на ваш registry
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        command: ["uvicorn", "fetcher.api:app", "--host", "0.0.0.0", "--port", "8000"]
        env:
        - name: POSTGRES_DSN
          valueFrom:
            secretKeyRef:
              name: fetcher-secrets
              key: postgres-dsn
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: fetcher-secrets
              key: redis-url
        - name: S3_ENDPOINT_URL
          valueFrom:
            configMapKeyRef:
              name: fetcher-config
              key: s3-endpoint-url
        - name: S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: fetcher-secrets
              key: s3-access-key
        - name: S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: fetcher-secrets
              key: s3-secret-key
        - name: S3_BUCKET_RAW
          valueFrom:
            configMapKeyRef:
              name: fetcher-config
              key: s3-bucket-raw
        - name: DATAPROCESSOR_API_URL
          valueFrom:
            configMapKeyRef:
              name: fetcher-config
              key: dataprocessor-api-url
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: fetcher-config
              key: log-level
        resources:
          requests:
            cpu: "200m"      # 0.2 CPU
            memory: "256Mi"  # 256 MB RAM
          limits:
            cpu: "1"         # Максимум 1 CPU
            memory: "512Mi"  # Максимум 512 MB RAM
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

