# Пример Secrets для Fetcher
# ВАЖНО: Не коммитьте реальные секреты в git!
# Используйте Kubernetes Secrets или внешний secrets manager (Vault, AWS Secrets Manager, etc.)

apiVersion: v1
kind: Secret
metadata:
  name: fetcher-secrets
  labels:
    app: fetcher
type: Opaque
stringData:
  # PostgreSQL DSN
  # Формат: postgresql+psycopg2://user:password@host:port/database?sslmode=require
  postgres-dsn: "postgresql+psycopg2://fetcher:CHANGE_ME@postgres-service:5432/fetcher_db?sslmode=require"
  
  # Redis URL
  # Формат: redis://host:port/db или rediss://host:port/db для TLS
  redis-url: "redis://redis-service:6379/0"
  
  # S3/MinIO credentials
  s3-access-key: "CHANGE_ME"
  s3-secret-key: "CHANGE_ME"
  
  # Proxy credentials (опционально)
  proxy-auth-username: ""
  proxy-auth-password: ""

---
