apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fetcher-comments-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fetcher-comments-worker
  minReplicas: 1      # Минимум 1 worker
  maxReplicas: 15     # Максимум 15 worker'ов
  metrics:
  # Масштабирование по CPU
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Масштабирование по памяти
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max

