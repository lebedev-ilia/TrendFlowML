# Example Secret consumed by all components. DO NOT commit real values.
# Create it for real with:
#   kubectl -n trendflow create secret generic app-secrets \
#     --from-literal=database-url='postgresql://trendflow:trendflow@postgres:5432/trendflow' \
#     --from-literal=redis-url='redis://redis:6379/0' \
#     --from-literal=redis-password='' \
#     --from-literal=minio-endpoint='http://minio:9000' \
#     --from-literal=minio-access-key='minioadmin' \
#     --from-literal=minio-secret-key='minioadmin123' \
#     --from-literal=dataprocessor-api-key='dev-key' \
#     --from-literal=hf-token=''                       # only if the HF model repo is private
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: trendflow
type: Opaque
stringData:
  database-url: "postgresql://trendflow:trendflow@postgres:5432/trendflow"
  postgres-password: "trendflow"
  redis-url: "redis://redis:6379/0"
  redis-password: ""
  minio-endpoint: "http://minio:9000"
  minio-access-key: "minioadmin"
  minio-secret-key: "minioadmin123"
  dataprocessor-api-key: "dev-key"
  hf-token: ""
