apiVersion: v1
kind: ConfigMap
metadata:
  name: dataprocessor-config
  namespace: trendflow
data:
  # Multi-node: results MUST live in shared object storage (S3/MinIO), not local fs,
  # so every worker/api pod sees the same result_store. (storage/settings.py)
  TREND_STORAGE_BACKEND: "s3"
  S3_ENDPOINT: "http://minio:9000"
  S3_BUCKET: "trendflow"
  S3_PREFIX: "trendflowml"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  DEBUG: "false"
